AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  LoopBreakerFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.12
      MemorySize: 512
      Timeout: 30
      Architectures:
        - arm64
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
          AllowHeaders:
            - content-type
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-micro-v1:0
                - !Sub arn:aws:bedrock:*::foundation-model/amazon.nova-micro-v1:0
                - !Sub arn:aws:bedrock:us-east-1:${AWS::AccountId}:inference-profile/us.amazon.nova-micro-v1:0

Outputs:
  FunctionUrl:
    Description: Public URL for Loop Breaker
    Value: !GetAtt LoopBreakerFnUrl.FunctionUrl
